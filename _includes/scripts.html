<script src="assets/js/main.min.js"></script>

<script>
  // Scroll spy - highlight active nav section
  $(function() {
    $(window).on('scroll', function() {
      var scrollPos = $(document).scrollTop() + 80;
      var activeId = '';
      $('.anchor[id]').each(function() {
        if ($(this).offset().top <= scrollPos) activeId = this.id;
      });
      $('.masthead__menu-item a').removeClass('active-nav');
      if (activeId) {
        $('.masthead__menu-item a[href$="' + activeId + '"]').addClass('active-nav');
      }
    });
  });

  // GitHub stats - fetch star count for Code links
  $(function() {
    var CACHE_KEY = 'ghstars_v2';
    var CACHE_TTL = 12 * 60 * 60 * 1000;
    var DELAY_MS = 800;

    function loadCache() {
      try { var r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : {}; }
      catch(e) { return {}; }
    }
    function saveCache(c) {
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(c)); }
      catch(e) {}
    }

    var cache = loadCache();
    var now = Date.now();
    var queue = [];

    $('.page__content a[href*="github.com"]').each(function() {
      var $link = $(this);
      var href = $link.attr('href');
      if (!href) return;
      var m = href.match(/github\.com\/([^\/]+)\/([^\/\s\)\]?#]+)/);
      if (!m) return;
      var repo = m[1] + '/' + m[2];
      if ($link.next('.gh-stats').length) return;

      var $badge = $('<span class="gh-stats" data-repo="' + repo + '"></span>');
      $link.after($badge);

      if (cache[repo] && (now - cache[repo].ts) < CACHE_TTL) {
        renderBadge($badge, cache[repo].stars);
      } else {
        $badge.text(' \u22EF');
        queue.push({ repo: repo, $badge: $badge });
      }
    });

    if (!queue.length) return;

    function fetchNext(i) {
      if (i >= queue.length) return;
      var item = queue[i];
      $.getJSON('https://api.github.com/repos/' + item.repo)
        .done(function(data) {
          var stars = data.stargazers_count || 0;
          cache[item.repo] = { stars: stars, ts: Date.now() };
          renderBadge(item.$badge, stars);
        })
        .fail(function(xhr) {
          if (xhr.status === 403) {
            item.$badge.text(' rate-limited');
          } else if (xhr.status === 404) {
            item.$badge.text('');
          } else {
            item.$badge.text('');
          }
        })
        .always(function() {
          saveCache(cache);
          setTimeout(function() { fetchNext(i + 1); }, DELAY_MS);
        });
    }
    fetchNext(0);

    function renderBadge($el, stars) {
      $el.html(
        '<span style="font-size:1em;font-weight:700;color:#e3b341;margin:0 4px;vertical-align:middle;">' +
        '\u2B50 ' + stars +
        '</span>'
      );
    }
  });

  // Journal IF injection
  $(function() {
    var journalIF = {{ site.data.journal_if | jsonify }};
    if (!journalIF || $.isEmptyObject(journalIF)) return;

    $('span[style*="#1E40AF"]').each(function() {
      var $badge = $(this);
      var journalName = $badge.text().trim();
      var ifVal = journalIF[journalName];
      if (ifVal === undefined) return;

      var ifText = 'IF=' + ifVal.toFixed(1);
      var $nextSpan = $badge.next('span');

      if ($nextSpan.length) {
        var text = $nextSpan.text();
        text = text.replace(/[,，]\s*影响因子[>≥]\d+(\.?\d*)/, '');
        if (/IF=\d+(\.\d+)?/.test(text)) return;
        $nextSpan.text(text.replace(/）$/, '，' + ifText + '）'));
      } else {
        $('<span style="color:red">（' + ifText + '）</span>').insertAfter(this);
      }
    });
  });

  // Aggregate per-year citation and star counts into year headers
  function aggregateYearStats() {
    var $yearHeaders = $('h2').filter(function() {
      return /📆\s*20\d{2}年/.test($(this).text());
    });
    if (!$yearHeaders.length) return;

    $yearHeaders.each(function() {
      var $h2 = $(this);
      var $yearSpan = $h2.find('span[style*="color:red"]');
      if (!$yearSpan.length) return;
      var yearText = $yearSpan.text();
      if (/📈/.test(yearText)) return; // already aggregated

      // Collect all <li> between this h2 and the next h2
      var $items = $h2.nextUntil('h2').find('li');
      if (!$items.length) return;

      var totalCitations = 0;
      var totalStars = 0;

      $items.each(function() {
        var citedMatch = $(this).find('.paper-cited').text().match(/(\d+)/);
        if (citedMatch) totalCitations += parseInt(citedMatch[1], 10);

        $(this).find('.gh-stats').each(function() {
          var starMatch = $(this).text().match(/(\d+)/);
          if (starMatch) totalStars += parseInt(starMatch[1], 10);
        });
      });

      $yearSpan.text(
        yearText
          .replace(/^\(/, '(📄')
          .replace(/）$/, '；📈' + totalCitations + '；⭐' + totalStars + '）')
      );
    });
  }
</script>
