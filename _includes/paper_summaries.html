<script>
$(function() {
  var summaries = {

"SAMIX: Reinforcing SAM2 with Semantic Adapter and Reference Selecting Policy for Mix-Supervised Segmentation":
"SAMIX在SAM2基础上添加语义适配器（Semantic Adapter）扩展特征表达，并设计参考帧选择策略（Reference Selecting Policy），在混合监督（全监督+弱监督）场景下自动挑选最具信息量的标注帧。通过融合两种标注资源，提升分割模型在有限标注条件下的性能。",

"RouterNet: Hierarchical Point Routing Network for Robust Vertebral Landmark Localization on AP X-ray Images":
"RouterNet提出层级式点路由网络，用于AP位X光片上的脊椎标志点定位。网络不一次性预测所有关键点，而是从粗到细逐层路由、逐级精修，先定位全局结构再细化局部，增强对骨骼重叠和姿态差异的鲁棒性。",

"FIA-Edit: Frequency-Interactive Attention for Efficient and High-Fidelity Inversion-Free Text-Guided Image Editing":
"FIA-Edit提出免逆变换（inversion-free）的文本引导图像编辑框架。核心包括两个模块：频域特征交互（FRI）在自注意力中交换源图与目标图的频率分量实现跨域对齐；特征注入（FIJ）将源图的query/key/value和文本嵌入显式注入目标分支的交叉注意力以保留结构。单张512×512图像在RTX 4090上约6秒。首次将文本编辑扩展到临床医学场景，用于合成手术出血的解剖一致性变化以增强下游出血分类数据。",

"Pairing-free Group-level Knowledge Distillation for Robust Gastrointestinal Lesion Classification in White-Light Endoscopy":
"PaGKD打破知识蒸馏必须配对数据的限制，在完全不配对的WLI和NBI数据上进行跨模态知识迁移。包含两个模块：组级原型蒸馏（GKD-Pro）通过共享的病变感知查询提取模态不变语义原型；组级密集蒸馏（GKD-Den）利用激活图导出的关系图实现跨模态像素级对齐。在四组临床数据上AUC相对提升1.1%~3.3%。",

"StyleSeg V2: Towards Robust Single-label-supervised Segmentation of Brain Tissue via Optimization-free Registration Error Perception":
"StyleSeg V2在仅使用单张标注图像（atlas）的条件下实现脑组织分割。核心是免优化的配准误差感知模块，在图像风格迁移过程中自动评估配准质量，无需额外的配准网络训练。解决StyleSeg V1中配准误差导致风格迁移不可靠的问题，显著提升单标签监督下的分割鲁棒性。",

"Cross-correlation Rectification for Robust Deformable Registration of Brain Tumor MRI between Preoperative and Postoperative Phases":
"针对脑肿瘤MRI术前与术后图像配准中由肿瘤切除引起的大形变和非对应区域问题，提出互相关矫正策略。通过分析形变场的局部互相关性来识别和修正不可靠的配准区域，避免错误形变传播，提升术前-术后跨时间点配准的精度。",

"Moving Light Adaptive Colonoscopy Reconstruction via Illumination-Attenuation-Aware 3D Gaussian Splatting":
"ColIAGS解决结肠镜场景下3D Gaussian Splatting因移动光源导致的渲染失败问题。设计包含两种光照衰减因子的光照模型以模拟真实内镜照明，配合改进的几何建模（Improved Geometry Modeling）和外观建模（Improved Appearance Modeling）来隐式优化光照衰减解。在新视角合成和深度重建上均优于现有方法。",

"Knowledge-Contrastive Fine-Grained Attention for CVS Recognition in Cholecystectomy Without Dense Labels":
"针对胆囊切除术中关键安全视图（CVS）识别任务标注成本高的问题，提出知识对比细粒度注意力机制。在无密集标注的条件下，通过对比学习引导模型关注手术场景中的关键解剖结构区域，实现稀疏监督下的精细手术阶段识别。",

"MonoPCC: Photometric-invariant Cycle Constraint for Monocular Depth Estimation of Endoscopic Images":
"MonoPCC提出光度不变循环约束，解决内镜场景中传统光度一致性假设因剧烈光照变化而失效的问题。通过设计对光照变化鲁棒的跨帧对应约束，仅利用内镜单目视频即可估计深度图，无需额外深度传感器。在SCARED等内镜数据集上验证了深度估计精度。",

"FSI-Edit: Frequency and Stochasticity Injection for Flexible Diffusion-Based Image Editing":
"FSI-Edit提出基于频率和随机性注入的免微调图像编辑框架。频率残差融合（FRF）将重建特征的仅高频分量注入生成特征，避免直接替换导致的结构冲突；随机噪声注入（SNI）在自注意力图中引入可控噪声，拓展非刚性编辑的生成空间。支持添加、删除、姿态操作等非刚性编辑任务。",

"CoStoDet-DDPM: Collaborative Training of Stochastic and Deterministic Models Improves Surgical Workflow Anticipation and Recognition":
"CoStoDet-DDPM将去噪扩散概率模型（DDPM）引入手术流程分析，与确定性任务模型进行协同训练。DDPM分支学习手术中的过程不确定性以丰富特征表示，任务分支负责预测手术阶段和器械使用。推理时仅使用任务分支，不增加计算开销。在Cholec80上手术预期误差降16%，阶段识别Jaccard提1.0%。",

"MonoBox: Tightness-free Box-supervised Polyp Segmentation using Monotonicity Constraint":
"MonoBox解除框监督分割中\"框边缘必须紧贴目标\"的限制。用单调性约束替代传统MIL损失：在框边缘噪声区内强制模型响应沿前景→背景方向单调递减。结合自适应标签修正利用历史预测掩码收紧标注框，训练中动态缩小噪声区。在息肉分割上Dice至少提升5.5%。",

"Joint Holistic and Lesion Controllable Mammogram Synthesis via Gated Conditional Diffusion Model":
"提出门控条件扩散模型，实现乳腺钼靶图像的整体及病变可控合成。模型能够同时控制全图风格和局部病变特征，支持在合成过程中指定病变的有无、大小和位置，为乳腺影像数据增强和病灶分析提供可控生成工具。",

"Single-slice Semi-supervised 3D Medical Image Segmentation via Correlation Information Enhancement and Hybrid Pseudo Mask Generation":
"针对3D医学图像分割标注成本高的问题，提出基于单切片标注的半监督学习框架。利用切片间相关信息增强机制挖掘相邻切片间的关联信息，结合混合伪掩码生成策略为未标注切片产生可靠伪标签，实现从单切片标注到全3D分割的扩展。",

"Boosting Few-shot Semantic Segmentation of 3D Medical Images via Collaborative Slice Alignment":
"提出协同切片对齐策略提升3D医学图像的少样本语义分割。通过在不同支持样本和查询样本之间建立切片级对应关系，实现跨体积的特征对齐与信息融合，缓解少样本场景下标注支持样本不足导致的泛化困难。",

"Improving 3D Thin Vessel Segmentation in Brain TOF-MRA via a Dual-space Context-Aware Network":
"DCANet提出双空间上下文感知网络用于脑TOF-MRA图像中的3D细血管分割。分别在图像空间和特征空间构建上下文感知模块，增强对细小血管结构的特征响应，解决TOF-MRA中血管边界模糊、信号不均导致的细血管漏检问题。",

"TSRNet: Target-aware Self Region-prompting Network for Brain Tumor Segmentation":
"TSRNet提出目标感知自区域提示网络。网络自动从输入图像中发现肿瘤候选区域，并将区域信息作为提示反馈给分割模块，实现无需外部先验的目标驱动分割，在脑肿瘤分割任务中提升对不规则病灶的定位精度。",

"Targeted False Positive Synthesis via Detector-guided Adversarial Diffusion Attacker for Robust Polyp Detection":
"DADA提出对抗扩散框架合成高价值假阳性（false positive）。先通过区域噪声匹配策略训练仅关注背景的扩散模型，再引入检测器引导的对抗攻击（DADA模块）来扰动负样本生成过程，使模型生成最能迷惑检测器的伪病灶图案。合成数据用于增强训练后，检测器F1分数提升至少2.6%。",

"Holistic White-light Polyp Classification via Alignment-free Dense Distillation of Auxiliary Optical Chromoendoscopy":
"ADD提出免对齐密集蒸馏模块，在全图级别利用NBI辅助信息提升WLI息肉分类。无需图像对齐，通过像素级跨域亲和力学习建立WLI和NBI特征图之间的对应关系，并用CAM过滤确保蒸馏路径仅沿语义相关区域进行。AUC相对提升至少2.5%。",

"TiS-TSL: Image-Label Supervised Surgical Video Stereo Matching via Time-Switchable Teacher-Student Learning":
"TiS-TSL在仅使用稀疏图像级标签的条件下实现手术视频立体匹配。统一模型支持三种模式：图像预测（IP）、前向视频预测（FVP）和后向视频预测（BVP）。两阶段训练：图像到视频（I2V）阶段将稀疏图像知识迁移至视频，视频到视频（V2V）阶段利用双向时空一致性识别并过滤不可靠伪标签，提升时序视差稳定性。",

"Bidirectional Mammogram View Translation with Column-Aware and Implicit 3D Conditional Diffusion":
"CA3D-Diff实现乳腺钼靶CC和MLO两个标准视角的双向互转。列感知交叉注意力利用钼靶几何特性——解剖对应区域在列方向上大致对齐，用高斯衰减偏置抑制远距离误匹配。隐式3D结构重建模块将2D噪声潜变量反投影为3D特征体积，引导跨视角生成。合成视图能有效提升单视角恶性分类性能。",

"DACAT: Dual-stream Adaptive Clip-aware Time Modeling for Robust Online Surgical Phase Recognition":
"DACAT提出双流自适应片段感知时序建模方法，用于在线手术阶段识别。双流结构分别处理短期运动信息和长期上下文信息，自适应片段感知模块动态调整时序感受野以适应不同手术阶段的持续时间差异，实现鲁棒的实时手术阶段分类。",

"First-frame Supervised Video Polyp Segmentation via Propagative and Semantic Dual-teacher Network":
"PSDNet将视频息肉分割标注成本降至每个视频仅标首帧。双教师架构包括传播教师（通用目标跟踪器将首帧标注传播到后续帧）和语义教师（学生模型的EMA，产出更稳定的伪标签）。反向传播评估策略将伪标签反向跟踪回首帧，基于对齐度评估标签质量以指导知识迁移。在SUN-SEG上Dice提升至少4.5%。",

"SPNet: Sparse-mask Prompt-learning Network for Cerebrovascular Segmentation":
"SPNet提出稀疏掩码提示学习网络进行脑血管分割。利用少量稀疏标注作为提示信号来引导网络学习血管分割任务，在仅需极少量标注的条件下获得完整血管分割结果，降低脑血管标注成本。",

"Robust Semi-supervised 3D Medical Image Segmentation with Diverse Joint-task Learning and Decoupled Inter-student Learning":
"DDL提出多样联合任务学习和解耦学生间学习框架用于半监督3D医学图像分割。多任务分支（分割、重建等）互相增强学习信号，解耦学生间学习避免不同学生模型的同质化，提升半监督场景下各学生模型的多样性和整体分割性能。",

"Fine-grained Temporal Site Monitoring in EGD Streams via Visual Time-aware Embedding and Vision-text Asymmetric Coworking":
"VTE-VAC提出视觉时态感知嵌入和视觉-文本非对称协同框架，用于胃镜视频流中的细粒度时间部位监测。时间感知嵌入捕获内镜检查中的时序进度特征，视觉-文本非对称协同利用文本描述信息辅助视觉模型识别当前解剖部位，实现无密集标注的胃镜部位自动跟踪。",

"Accurate scoliosis vertebral landmark localization on x-ray images via shape-constrained multi-stage cascaded cnns":
"提出形状约束的多级级联CNN用于脊柱侧弯X光片上的脊椎标志点精确定位。多级网络由粗到细逐级精修关键点坐标，形状约束模块利用脊椎的解剖形态先验来修正不合理的关键点预测，提升在严重侧弯和姿态差异下的定位鲁棒性。",

"SALI: Short-term Alignment and Long-term Interaction Network for Colonoscopy Video Polyp Segmentation":
"SALI网络结合短时对齐模块（SAM）和长时交互模块（LIM）做结肠镜视频息肉分割。SAM通过可变形卷积学习相邻帧的空间对齐特征并融合，捕获稳定的短时息肉表达；LIM维护历史息肉表达的长时记忆库，在遇到低质量帧时通过回溯交互重建可靠息肉特征。在SUN-SEG上Dice提升2.1%~4.1%。",

"Noise Removed Inconsistency Activation Map for Unsupervised Registration of Brain Tumor MRI between Pre-operative and Follow-up Phases":
"NR-IAM提出噪声去除的不一致性激活图用于脑肿瘤MRI术前与随访图像的无监督配准。先通过训练初期的配准网络计算不一致性激活图来定位肿瘤变化区域，再引入噪声掩码处理（NMP）滤除配准噪声，得到精确的肿瘤不一致区域以指导后续配准优化。",

"Improved Self-supervised Monocular Endoscopic Depth Estimation based on Pose Alignment-friendly Dynamic View Selection":
"DVSMono提出基于姿态对齐友好的动态视图选择策略改进自监督单目内镜深度估计。通过评估候选帧与当前帧的姿态对齐难度来动态选择训练视图对，避免选择对齐困难帧导致的训练不稳定，提升内镜深度估计精度。",

"Decoupling Feature Representations of Ego and Other Modalities for Incomplete Multi-modal Brain Tumor Segmentation":
"DeMoSeg将多模态脑肿瘤分割中每模态的特征解耦为自身表达和跨模态互表达。包含特征解耦、基于临床先验的特征补偿和U-Net分割骨干三个主要组件。CSSA层实现特征间的跨引导，RCR特征补偿策略在模态缺失时利用可用模态信息填补缺失模态特征。在BraTS2020/2018/2015上均取得最优结果。",

"Bidirectional Semi-supervised Dual-branch CNN for Robust 3D Reconstruction of Stereo Endoscopic Images via Adaptive Cross and Parallel Supervisions":
"提出双向半监督双分支CNN用于立体内镜图像的鲁棒3D重建。双分支架构同时学习视差估计和重建，自适应交叉监督和并行监督策略利用少量标注数据和大量无标注立体图像进行联合训练，在半监督场景下实现高质量的3D内镜重建。",

"Robust One-Shot Segmentation of Brain Tissues via Image-Aligned Style Transformation":
"StyleSeg提出图像对齐风格变换实现脑组织的one-shot分割。通过配准网络将标注atlas图像与目标图像对齐后，利用风格变换模块将atlas图像的风格适配为目标图像风格，使分割网络能在风格一致的条件下一发分割。包含无监督回归训练、有监督分割训练和弱监督回归训练三个阶段。",

"Dual-view Correlation Hybrid Attention Network for Robust Holistic Mammogram Classification":
"DCHA-Net提出双视图相关混合注意力网络用于乳腺钼靶全图分类。在CC和MLO两个视图之间建立特征相关性，混合注意力机制同时聚焦通道和空间维度上最具判别力的特征区域，利用双视图互补信息提升乳腺图像分类鲁棒性。",

"Rethinking Low-Dose CT Synthesis: Degrading Normal-Dose CT from Origin for Pairwise Training of CT Denoiser":
"重新思考低剂量CT合成范式：从原始正常剂量CT出发进行退化模拟以生成配对训练数据。不同于传统从低剂量CT到正常剂量CT的去噪思路，该方法在正常剂量CT上施加物理建模的退化操作生成模拟低剂量CT，获得精确像素级配对的训练数据用于CT去噪器训练。",

"Towards Learning-based Surgical Planning of Glioma Resection via a Contrastively Constrained Siamese Neural Network":
"提出对比约束的孪生神经网络用于胶质瘤切除的手术规划学习。孪生网络同时处理术前MRI和预期术后结构的表示，对比约束引导网络学习切除前后脑组织的对应变化关系，辅助外科医生制定手术切除方案。",

"Joint progressive and coarse-to-fine registration of brain MRI via deformation field integration and non-rigid feature fusion":
"PCR-Net提出形变场集成和非刚性特征融合方法，在渐进式和由粗到细两个维度上分解脑MRI配准任务。DFI模块将渐进式分解的各级形变场进行集成，NFF模块在粗到细路径中融合不同尺度的非刚性特征，缓解一步预测大形变场的困难。在LPBA40数据集上验证。",

"Accurate Cobb Angle Estimation on Scoliosis X-ray Images via Deeply-coupled Two-stage Network with Differentiable Cropping and Random Perturbation":
"提出深度耦合两阶段网络实现脊柱侧弯X光片上Cobb角的精确自动估计。第一阶段用可微分裁剪定位脊椎区域，第二阶段在裁剪区域上估计Cobb角。两阶段深度耦合训练，随机扰动增强提升模型对X光片拍摄角度差异的鲁棒性。",

"Progressive and Coarse-to-Fine Network for Medical Image Registration Across Phases, Modalities and Patients":
"提出渐进式粗到细网络用于跨时间、跨模态和跨患者的医学图像配准。网络按配准难度递进分解形变场：先配准大体结构再精细调整局部形变，由粗到细的框架在不同配准场景下均实现高效配准。",

"Improving the Quality of Sparse-view Cone-Beam Computed Tomography via Reconstruction-Friendly Interpolation Network":
"提出重建友好的插值网络来改善稀疏视角CBCT图像质量。网络学习从稀疏投影到密集投影的插值映射，使得插值后的投影数据更适合后续CT重建算法处理，从而在减少辐射剂量的同时保持重建图像质量。",

"Semi-supervised Learning via Improved Teacher-Student Network for Robust 3D Reconstruction of Stereo Endoscopic Image":
"提出改进的教师-学生网络用于立体内镜图像的半监督3D重建。在教师-学生框架基础上引入改进策略以增强伪标签质量和训练稳定性，利用少量标注数据和大量无标注立体内镜数据进行半监督训练。",

"Towards Robust Dual-View Transformation via Densifying Sparse Supervision for Mammography Lesion Matching":
"通过稠密化稀疏监督实现乳腺钼靶双视图间的鲁棒变换和病灶匹配。在仅有少量病灶级标注的条件下，通过稠密化策略将稀疏监督信号扩展到全图，学习CC和MLO视图之间的像素级对应关系以辅助跨视图病灶匹配。",

"Multi-task siamese network for retinal artery/vein separation via deep convolution along vessel":
"提出多任务孪生网络沿血管方向做深度卷积，实现视网膜动静脉分离。孪生结构同时学习血管分割和动静脉分类两个任务，沿血管方向的深度卷积利用血管的连续性先验来增强分类一致性，在眼底图像上实现精确的A/V分类。",

"Semi-supervised mp-MRI data synthesis with StitchLayer and auxiliary distance maximization":
"提出StitchLayer和辅助距离最大化策略用于半监督多参数MRI数据合成。StitchLayer实现多模态MRI数据的无缝拼接合成，辅助距离最大化约束增强合成数据与真实数据之间的判别性，在有限标注条件下生成高质量前列腺mp-MRI数据。",

"Automated detection of clinically significant prostate cancer in mp-MRI images based on an end-to-end deep neural network":

  function normalize(s) {
    return s.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
  }

  $('.page__content li').each(function() {
    var $li = $(this);
    var html = $li.html();
    if (html.indexOf('Zhiwei Wang') < 0) return;
    if ($li.find('details.paper-intro').length) return;
    var $em = $li.find('em').first();
    if (!$em.length) return;
    var text = $em.text().trim();
    if (text.length < 15) return;

    var norm = normalize(text);
    var summary = summaries[text];
    if (!summary) {
      for (var key in summaries) {
        var kn = normalize(key);
        if (kn.indexOf(norm) >= 0 || norm.indexOf(kn) >= 0) {
          summary = summaries[key];
          break;
        }
      }
    }
    if (!summary) return;

    $li.append(
      '<br><details class="paper-intro" style="margin-top:4px;">' +
      '<summary style="cursor:pointer;color:#6a737d;font-size:0.82em;font-weight:500;">� Abstract</summary>' +

      summary +
