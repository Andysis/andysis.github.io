<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        $.getJSON(gsDataBaseUrl + "google-scholar-stats/gs_data.json")
        .done(function (data) {
            var totalCitation = data['citedby'];
            var el = document.getElementById('total_cit');
            if (el && totalCitation) el.innerHTML = totalCitation;

            var citationEles = document.getElementsByClassName('show_paper_citations');
            Array.prototype.forEach.call(citationEles, function(element) {
                var paperId = element.getAttribute('data');
                if (data['publications'] && data['publications'][paperId]) {
                    var numCitations = data['publications'][paperId]['num_citations'];
                    element.innerHTML = '| Citations: ' + numCitations;
                }
            });

            function normalize(s) {
                return s.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
            }

            if (data['publications']) {
                var titleMap = {};
                var seen = {};
                for (var pid in data['publications']) {
                    var pub = data['publications'][pid];
                    if (pub.bib && pub.bib.title) {
                        var key = normalize(pub.bib.title);
                        if (!seen[key]) {
                            seen[key] = true;
                            titleMap[key] = pub.num_citations || 0;
                        }
                    }
                }

                $('.page__content li').each(function() {
                    var $li = $(this);
                    if (!$li.find('span[style*="background-color"]').length) return;
                    if ($li.find('.paper-cited').length) return;
                    var $em = $li.find('em').first();
                    if (!$em.length) return;
                    var text = $em.text().trim();
                    if (text.length < 15) return;

                    var norm = normalize(text);
                    var count = titleMap[norm];
                    if (count === undefined) {
                        for (var key in titleMap) {
                            if (key.indexOf(norm) >= 0 || norm.indexOf(key) >= 0) {
                                count = titleMap[key];
                                break;
                            }
                        }
                    }
                    if (count === undefined) count = 0;
                    var color;
                    if (count === 0) color = '#9ca3af';
                    else if (count < 10) color = '#4285f4';
                    else if (count < 100) color = '#34a853';
                    else if (count < 1000) color = '#f59e0b';
                    else color = '#ea4335';
                    $em.before(
                        '<span class="paper-cited" style="font-size:0.85em;font-weight:600;color:' + color + ';margin-right:6px;vertical-align:middle;white-space:nowrap;">[cited ' + count + ']</span> '
                    );
                });

                // Wait for GitHub stars to inject, then aggregate
                setTimeout(function() {
                  if (typeof aggregateYearStats === 'function') aggregateYearStats();
                }, 2500);
            }
        })
        .fail(function() {});
    })
</script>
